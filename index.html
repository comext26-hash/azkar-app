<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#8B6914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الأذكار">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>أذكار الصباح والمساء</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #8B6914;
    --gold-mid: #A67C1A;
    --gold-light: #C9A84C;
    --gold-shine: #D4A843;
    --dark: #0D1B2A;
    --dark2: #132238;
    --dark3: #1A2E48;
    --text: #F0E6D0;
    --text-muted: #A89880;
    --evening: #3A5F80;
    --evening-light: #6B8CAE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 8%, rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 10%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 30%, rgba(139,105,20,0.25) 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 60%, rgba(139,105,20,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    text-align: center;
    padding: 24px 0 16px;
    animation: fadeDown 0.8s ease;
  }

  .header-icon {
    font-size: 2.2rem;
    margin-bottom: 6px;
    display: block;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: 1.8rem;
    color: var(--gold-shine);
    letter-spacing: 1px;
    text-shadow: 0 0 30px rgba(139,105,20,0.5);
  }

  header p {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 5px;
    font-weight: 300;
  }

  /* Tab Switcher */
  .tab-switcher {
    display: flex;
    background: var(--dark2);
    border-radius: 50px;
    padding: 5px;
    margin: 16px 0 18px;
    border: 1px solid rgba(139,105,20,0.2);
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .tab-btn {
    flex: 1;
    padding: 11px 16px;
    border: none;
    border-radius: 45px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.4s ease;
    background: transparent;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab-btn.active.morning {
    background: linear-gradient(135deg, var(--gold), var(--gold-shine));
    color: #fff;
    box-shadow: 0 4px 20px rgba(139,105,20,0.45);
  }

  .tab-btn.active.evening {
    background: linear-gradient(135deg, #2A4F70, var(--evening));
    color: #fff;
    box-shadow: 0 4px 20px rgba(58,95,128,0.4);
  }

  /* Progress Bar */
  .progress-wrap {
    margin-bottom: 18px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
  }

  .progress-label { font-size: 0.78rem; color: var(--text-muted); }
  .progress-count { font-size: 0.82rem; color: var(--gold-shine); font-weight: 700; }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--gold), var(--gold-shine));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .evening-mode .progress-fill {
    background: linear-gradient(90deg, #2A4F70, var(--evening-light));
  }

  /* Single card display */
  .card-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 0 24px;
  }

  /* Zikr Card */
  .zikr-card {
    background: var(--dark2);
    border: 1px solid rgba(139,105,20,0.18);
    border-radius: 24px;
    padding: 28px 20px 24px;
    position: relative;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(139,105,20,0.08);
  }

  .zikr-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(139,105,20,0.07) 0%, transparent 70%);
    border-radius: 50%;
    transform: translate(25px, -25px);
    pointer-events: none;
  }

  /* Card enter animation */
  .card-enter {
    animation: cardEnter 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(50px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Card exit animation */
  .card-exit {
    animation: cardExit 0.3s ease-in both;
    pointer-events: none;
  }

  @keyframes cardExit {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-60px) scale(0.93); }
  }

  .zikr-number {
    font-size: 0.72rem;
    color: var(--gold);
    background: rgba(139,105,20,0.12);
    border: 1px solid rgba(139,105,20,0.2);
    padding: 3px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .zikr-text {
    font-family: 'Amiri', serif;
    font-size: 1.28rem;
    line-height: 2.15;
    color: var(--text);
    margin-bottom: 20px;
    text-align: justify;
  }

  .zikr-source {
    font-size: 0.73rem;
    color: var(--text-muted);
    margin-bottom: 20px;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .zikr-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  /* Counter circles */
  .counter-circles {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    max-width: 120px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(139,105,20,0.2);
    transition: all 0.3s ease;
  }

  .dot.filled {
    background: var(--gold-shine);
    border-color: var(--gold-shine);
    box-shadow: 0 0 6px rgba(212,168,67,0.5);
  }

  .count-btn {
    background: linear-gradient(145deg, var(--gold), var(--gold-shine));
    border: none;
    border-radius: 50px;
    padding: 16px 28px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 5px 20px rgba(139,105,20,0.35), 0 2px 6px rgba(0,0,0,0.3);
    flex: 1;
    justify-content: center;
    max-width: 220px;
    min-height: 54px;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    z-index: 2;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
  }

  .count-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s ease;
  }

  .count-btn:active::after { left: 150%; }

  .count-btn:active { transform: scale(0.95); }

  .evening-mode .count-btn {
    background: linear-gradient(145deg, #2A4F70, var(--evening));
    box-shadow: 0 5px 20px rgba(58,95,128,0.35), 0 2px 6px rgba(0,0,0,0.3);
  }

  .count-badge {
    background: rgba(0,0,0,0.2);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.85rem;
    min-width: 32px;
    text-align: center;
  }

  /* Tap ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transform: scale(0);
    animation: rippleAnim 0.5s linear;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Completion Screen */
  .completion {
    display: none;
    text-align: center;
    padding: 50px 20px;
    animation: fadeUp 0.8s ease;
    flex: 1;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .completion.show {
    display: flex;
  }

  .completion-icon {
    font-size: 4rem;
    margin-bottom: 16px;
    animation: bounce 1s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-14px); }
  }

  .completion h2 {
    font-family: 'Amiri', serif;
    font-size: 1.7rem;
    color: var(--gold-shine);
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(212,168,67,0.3);
  }

  .completion p {
    color: var(--text-muted);
    font-size: 0.92rem;
    line-height: 1.9;
    margin-bottom: 32px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-shine);
    padding: 13px 32px;
    border-radius: 50px;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
  }

  .reset-btn:hover, .reset-btn:active {
    background: var(--gold);
    color: #fff;
    box-shadow: 0 4px 15px rgba(139,105,20,0.3);
  }

  /* Install Banner */
  .install-banner {
    display: none;
    background: var(--dark3);
    border: 1px solid rgba(139,105,20,0.25);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 16px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: fadeUp 0.5s ease;
  }

  .install-banner.show { display: flex; }

  .install-banner p {
    font-size: 0.8rem;
    color: var(--text-muted);
    flex: 1;
  }

  .install-banner p strong { color: var(--gold-shine); display: block; margin-bottom: 2px; }

  .install-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-shine));
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .close-banner {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 4px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 0.72rem;
    opacity: 0.6;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-tap {
    animation: btnTap 0.18s ease;
  }

  @keyframes btnTap {
    0% { transform: scale(1); }
    50% { transform: scale(0.94); }
    100% { transform: scale(1); }
  }

  /* Divider */
  .divider {
    text-align: center;
    color: var(--gold);
    opacity: 0.25;
    font-size: 1rem;
    margin: 2px 0 14px;
    letter-spacing: 6px;
  }
</style>
</head>
<body>

<div class="app" id="app">
  <header>
    <span class="header-icon" id="headerIcon">☀️</span>
    <h1>أذكار الصباح والمساء</h1>
    <p>حصن نفسك بذكر الله</p>
  </header>

  <div id="installBanner" class="install-banner">
    <p><strong>📲 ثبّت التطبيق</strong>أضفه إلى الشاشة الرئيسية للوصول السريع</p>
    <button class="install-btn" onclick="installApp()">تثبيت</button>
    <button class="close-banner" onclick="dismissBanner()">✕</button>
  </div>

  <div class="tab-switcher">
    <button class="tab-btn active morning" id="tab-morning" onclick="switchTab('morning', event)">
      ☀️ أذكار الصباح
    </button>
    <button class="tab-btn evening" id="tab-evening" onclick="switchTab('evening', event)">
      🌙 أذكار المساء
    </button>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">تقدمك</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="divider">✦ ✦ ✦</div>

  <div class="card-container" id="cardContainer"></div>

  <div class="completion" id="completionScreen">
    <div class="completion-icon">🌟</div>
    <h2>أحسنت! بارك الله فيك</h2>
    <p>لقد أتممت جميع الأذكار<br>جعلها الله في ميزان حسناتك</p>
    <button class="reset-btn" onclick="resetAll()">🔄 إعادة من البداية</button>
  </div>

  <div class="footer">بسم الله الرحمن الرحيم</div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────
const azkarData = {
  morning: [
    { text: "أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ\n﴿اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ﴾", source: "آية الكرسي - البقرة: 255", count: 1 },
    { text: "﴿قُلْ هُوَ اللَّهُ أَحَدٌ، اللَّهُ الصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ﴾", source: "سورة الإخلاص", count: 3 },
    { text: "﴿قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ﴾", source: "سورة الفلق", count: 3 },
    { text: "﴿قُلْ أَعُوذُ بِرَبِّ النَّاسِ، مَلِكِ النَّاسِ، إِلَهِ النَّاسِ، مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ، الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ، مِنَ الْجِنَّةِ وَالنَّاسِ﴾", source: "سورة الناس", count: 3 },
    { text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ", source: "صحيح مسلم", count: 1 },
    { text: "اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ", source: "سنن الترمذي", count: 1 },
    { text: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ", source: "سيد الاستغفار - صحيح البخاري", count: 1 },
    { text: "اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ", source: "سنن أبي داود", count: 3 },

// ─── State ──────────────────────────────────────────────
let currentTab = 'morning';
let currentIndex = 0;
let currentCount = 0;
let deferredPrompt = null;

// ─── PWA ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      dismissBanner();
    });
  }
}

function dismissBanner() {
  document.getElementById('installBanner').classList.remove('show');
}

// ─── Vibration ──────────────────────────────────────────
function vibrate(pattern) {
  if ('vibrate' in navigator) {
    navigator.vibrate(pattern);
  }
}

// ─── Helpers ────────────────────────────────────────────
function getZikr() {
  return azkarData[currentTab][currentIndex];
}

function switchTab(tab, event) {
  currentTab = tab;
  currentIndex = 0;
  currentCount = 0;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  const app = document.getElementById('app');
  const headerIcon = document.getElementById('headerIcon');

  if (tab === 'evening') {
    app.classList.add('evening-mode');
    headerIcon.textContent = '🌙';
  } else {
    app.classList.remove('evening-mode');
    headerIcon.textContent = '☀️';
  }

  document.getElementById('completionScreen').classList.remove('show');
  document.getElementById('completionScreen').style.display = '';
  renderCard(true);
  updateProgress();
}

function updateProgress() {
  const total = azkarData[currentTab].length;
  const pct = total ? (currentIndex / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = currentIndex + ' / ' + total;
}

function buildDots(count, filled) {
  // For large counts (> 10), show a text counter instead of dots
  if (count > 10) return `<span style="font-size:0.78rem;color:var(--text-muted)">${filled}/${count}</span>`;
  let html = '<div class="counter-circles">';
  for (let i = 0; i < count; i++) {
    html += `<div class="dot ${i < filled ? 'filled' : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderCard(animate = false) {
  const container = document.getElementById('cardContainer');
  const total = azkarData[currentTab].length;

  if (currentIndex >= total) {
    container.innerHTML = '';
    document.getElementById('completionScreen').classList.add('show');
    vibrate([80, 60, 80, 60, 200]);
    updateProgress();
    return;
  }

  const zikr = getZikr();
  const remaining = zikr.count - currentCount;

  container.innerHTML = `
    <div class="zikr-card ${animate ? 'card-enter' : ''}" id="currentCard">
      <div class="zikr-number">الذكر ${currentIndex + 1} من ${total}</div>
      <div class="zikr-text">${zikr.text.replace(/\n/g, '<br>')}</div>
      <div class="zikr-source">📖 ${zikr.source}</div>
      <div class="zikr-footer">
        ${buildDots(zikr.count, currentCount)}
        <button class="count-btn" id="countBtn" type="button">
          اضغط للذكر
          <span class="count-badge" id="remainBadge">${remaining}</span>
        </button>
      </div>
    </div>
  `;

  // Attach event after render - use touchstart for instant mobile response
  const btn = document.getElementById('countBtn');
  if (btn) {
    let tapping = false;
    const doTap = (e) => {
      e.preventDefault();
      if (tapping) return;
      tapping = true;
      tapZikr();
      setTimeout(() => { tapping = false; }, 300);
    };
    btn.addEventListener('touchstart', doTap, { passive: false });
    btn.addEventListener('click', doTap);
  }
}

function updateCardInPlace() {
  const zikr = getZikr();
  const remaining = zikr.count - currentCount;

  // Update dots
  const footerEl = document.querySelector('.zikr-footer');
  if (footerEl) {
    const dotsHtml = buildDots(zikr.count, currentCount);
    footerEl.querySelector('.counter-circles, span') && (footerEl.children[0].outerHTML = dotsHtml);

    // Rebuild dots section properly
    const oldDots = footerEl.querySelector('.counter-circles') || footerEl.querySelector('span[style]');
    if (oldDots) {
      const tmp = document.createElement('div');
      tmp.innerHTML = dotsHtml;
      footerEl.replaceChild(tmp.firstChild, oldDots);
    }
  }

  const badge = document.getElementById('remainBadge');
  if (badge) badge.textContent = remaining;
}

function tapZikr() {
  const zikr = getZikr();
  const btn = document.getElementById('countBtn');

  // Ripple effect
  if (btn) {
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const size = Math.max(btn.offsetWidth, btn.offsetHeight);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (btn.offsetWidth / 2 - size / 2) + 'px';
    ripple.style.top = (btn.offsetHeight / 2 - size / 2) + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }

  currentCount++;

  if (currentCount >= zikr.count) {
    // Zikr complete — vibrate then animate out
    vibrate([60, 40, 120]);
    const card = document.getElementById('currentCard');
    if (card) {
      card.classList.add('card-exit');
      setTimeout(() => {
        currentIndex++;
        currentCount = 0;
        updateProgress();
        renderCard(true);
      }, 350);
    }
  } else {
    // Single vibrate tick
    vibrate(30);
    updateCardInPlace();
  }
}

function resetAll() {
  currentIndex = 0;
  currentCount = 0;
  document.getElementById('completionScreen').classList.remove('show');
  updateProgress();
  renderCard(true);
}

// ─── Init ────────────────────────────────────────────────
renderCard(true);
updateProgress();
</script>
